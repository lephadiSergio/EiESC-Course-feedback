<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

<style>

.line{
stroke:#00cfff;
stroke-width:2;
fill:none;
stroke-dasharray:8 6;
animation:flow 6s linear infinite;
opacity:0.6;
}

.node{
fill:#00cfff;
animation:pulse 2s infinite alternate;
}

@keyframes flow{
from{stroke-dashoffset:0;}
to{stroke-dashoffset:100;}
}

@keyframes pulse{
from{opacity:0.4; r:3;}
to{opacity:1; r:5;}
}

</style>

<!-- horizontal traces -->
<path class="line" d="M50 100 H400 V200 H800"/>
<path class="line" d="M100 300 H600 V400 H1100"/>
<path class="line" d="M50 600 H500 V500 H900"/>

<!-- vertical traces -->
<path class="line" d="M300 50 V300 H500"/>
<path class="line" d="M700 200 V600"/>
<path class="line" d="M1000 100 V450"/>

<!-- nodes -->
<circle class="node" cx="400" cy="100" r="4"/>
<circle class="node" cx="800" cy="200" r="4"/>
<circle class="node" cx="600" cy="300" r="4"/>
<circle class="node" cx="1100" cy="400" r="4"/>
<circle class="node" cx="500" cy="500" r="4"/>
<circle class="node" cx="900" cy="500" r="4"/>

</svg>
